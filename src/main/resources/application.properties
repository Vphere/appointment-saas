spring.application.name=appointment-saas

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Connection Pooling Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=120000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Enable batch processing for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
# Force IST timezone so all LocalDateTime values stored/returned are in India Standard Time
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Email transport selection
# "smtp"  -> Gmail via spring.mail.* above (port 587, often BLOCKED on PaaS
#            free tiers such as Render ? see EmailTransport/SmtpEmailSender).
# "brevo" -> Brevo transactional email HTTP API over port 443 (NOT blocked).
#            Requires BREVO_API_KEY + MAIL_FROM_ADDRESS (a sender verified in
#            your Brevo account). See BrevoEmailSender for setup steps.
app.mail.provider=${MAIL_PROVIDER:smtp}
brevo.api-key=${BREVO_API_KEY:}
app.mail.from-address=${MAIL_FROM_ADDRESS:${MAIL_USERNAME}}
app.mail.from-name=${MAIL_FROM_NAME:BookEase}

# Optional RabbitMQ-backed email retry queue
# Disabled by default ? the email_outbox table + EmailRetryScheduler already
# guarantee retries without RabbitMQ. Set EMAIL_QUEUE_ENABLED=true and the
# RABBITMQ_* env vars (e.g. from a CloudAMQP instance) to enable near-instant
# retries via RabbitMQ on top of the DB-backed scheduler.
app.email.queue.enabled=${EMAIL_QUEUE_ENABLED:false}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.listener.simple.missing-queues-fatal=false

app.upload.dir=/tmp/uploads/photos
app.document.dir=/tmp/uploads/documents
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.frontend.url=${FRONTEND_URL}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.deposit.percent=30
razorpay.currency=INR

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}